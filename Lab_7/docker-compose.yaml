services:
  app:
    build: .
    ports:
      - "5001:5000"
    environment:
      - OTLP_ENDPOINT=http://tempo:4318/v1/traces
      - DATABASE_URL=postgresql://clothes_user:clothes_password@db:5432/clothes
    depends_on:
      db:
        condition: service_started
      prometheus:
        condition: service_started
      tempo:
        condition: service_started

  db:
    image: postgres:15
    environment:
      POSTGRES_DB: clothes
      POSTGRES_USER: clothes_user
      POSTGRES_PASSWORD: clothes_password
    ports:
      - "5432:5432"

  prometheus:
    image: prom/prometheus:v2.52.0
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  tempo:
    image: grafana/tempo:2.4.1
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./tempo/tempo.yaml:/etc/tempo.yaml:ro
    ports:
      - "4317:4317"  # OTLP gRPC
      - "4318:4318"  # OTLP HTTP
      - "3200:3200"  # Tempo HTTP API (Grafana queries)

  grafana:
    image: grafana/grafana:10.4.2
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
      - ./grafana/dashboard-provisioning.yaml:/etc/grafana/provisioning/dashboards/dashboard-provisioning.yaml:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
      - tempo
