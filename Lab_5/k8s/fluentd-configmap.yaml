apiVersion: v1
kind: ConfigMap
metadata:
  name: fluentd-config
data:
  fluent.conf: |
    <source>
      @type tail
      path /var/log/containers/cloring-web*.log
      pos_file /var/log/fluentd-cloring.log.pos
      tag cloring.*
      read_from_head true
      <parse>
        @type json
        time_key time
        time_format %Y-%m-%dT%H:%M:%S.%NZ
      </parse>
    </source>

    <filter cloring.**>
      @type record_transformer
      <record>
        app cloring-web
        hostname "#{Socket.gethostname}"
      </record>
    </filter>

    <match cloring.**>
      @type stdout
    </match>
