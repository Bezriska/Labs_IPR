apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloring-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloring-web
  template:
    metadata:
      labels:
        app: cloring-web
    spec:
      containers:
        - name: cloring-web
          image: cloring-web:local
          imagePullPolicy: Never
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: cloring-config
          env:
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: cloring-secret
                  key: SECRET_KEY
          volumeMounts:
            - name: db-data
              mountPath: /app/data
            - name: uploads-data
              mountPath: /app/static/uploads
      volumes:
        - name: db-data
          persistentVolumeClaim:
            claimName: db-data-pvc
        - name: uploads-data
          persistentVolumeClaim:
            claimName: uploads-data-pvc
