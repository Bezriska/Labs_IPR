# prod overlay — SECRET_KEY для Flask
# ВНИМАНИЕ: в реальном prod используйте Sealed Secrets / External Secrets Operator.
# DATABASE_URL берётся из cloring-pg-secret, созданного infra/kustomize/overlays/prod.
# Перед деплоем выполните:
#   kubectl create secret generic cloring-secret \
#     --from-literal=SECRET_KEY="$(openssl rand -hex 32)" \
#     -n prod
apiVersion: v1
kind: Secret
metadata:
  name: cloring-secret
  namespace: prod
type: Opaque
stringData:
  SECRET_KEY: "REPLACE_WITH_STRONG_SECRET_KEY"
