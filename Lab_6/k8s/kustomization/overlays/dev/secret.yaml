# dev overlay — SECRET_KEY для Flask
# DATABASE_URL не дублируется здесь: берётся из cloring-pg-secret,
# созданного infra/kustomize/overlays/dev
apiVersion: v1
kind: Secret
metadata:
  name: cloring-secret
  namespace: dev
type: Opaque
stringData:
  SECRET_KEY: "dev-insecure-secret-key-change-in-prod"
