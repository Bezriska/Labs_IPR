apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: dev

bases:
  - ../../base

resources:
  - secret.yaml
  - pvc.yaml

patches:
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: cloring-web
      spec:
        replicas: 1
        template:
          spec:
            containers:
              - name: cloring-web
                image: cloring-web:dev
                env:
                  - name: FLASK_ENV
                    value: "development"
                  - name: FLASK_DEBUG
                    value: "1"
