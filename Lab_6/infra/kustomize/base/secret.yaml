# Базовый Secret — пароль переопределяется через overlay
apiVersion: v1
kind: Secret
metadata:
  name: cloring-pg-secret
type: Opaque
stringData:
  POSTGRES_USER: "cloring"
  POSTGRES_PASSWORD: "PLACEHOLDER_OVERRIDE_IN_OVERLAY"
  POSTGRES_DB: "cloring"
  DATABASE_URL: "postgresql://cloring:PLACEHOLDER_OVERRIDE_IN_OVERLAY@cloring-postgresql:5432/cloring"
