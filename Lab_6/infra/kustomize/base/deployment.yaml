apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloring-postgresql
  labels:
    app: cloring-postgresql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloring-postgresql
  template:
    metadata:
      labels:
        app: cloring-postgresql
    spec:
      containers:
        - name: postgresql
          image: postgres:15.3-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: cloring-pg-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cloring-pg-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: cloring-pg-secret
                  key: POSTGRES_DB
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: pg-data
              mountPath: /var/lib/postgresql/data
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "cloring"]
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "cloring"]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: pg-data
          persistentVolumeClaim:
            claimName: cloring-pg-pvc
