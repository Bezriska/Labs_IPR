apiVersion: v1
kind: Secret
metadata:
  name: cloring-pg-secret
type: Opaque
stringData:
  POSTGRES_USER: {{ .Values.postgresql.user | quote }}
  POSTGRES_PASSWORD: {{ .Values.postgresql.password | quote }}
  POSTGRES_DB: {{ .Values.postgresql.database | quote }}
  DATABASE_URL: "postgresql://{{ .Values.postgresql.user }}:{{ .Values.postgresql.password }}@cloring-postgresql:{{ .Values.service.port }}/{{ .Values.postgresql.database }}"
